backend:
  name: github
  repo: johncavpub/johncavpub.com
  base_url: https://api.netlify.com

media_library:
  name: cloudinary
  output_filename_only: true
  config:
    cloud_name: dkhct44d3
    api_key: "332423296667244"
    upload_preset: johncavanagh-decap

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "site"
    label: "Site"
    files:
      - name: "site"
        label: "Site Settings"
        file: "src/content/site.yml"
        fields:
          - label: "Site"
            name: "site"
            widget: "object"
            fields:
              - { label: "Author Name", name: "author_name", widget: "string" }
              - { label: "Site Tagline", name: "site_tagline", widget: "text" }
              - {
                  label: "Author Headshot Image",
                  name: "author_headshot_image",
                  widget: "image",
                  required: false,
                }
              - {
                  label: "Author Bio",
                  name: "author_bio",
                  widget: "text",
                  required: false,
                }
              - label: "Social Links"
                name: "social_links"
                widget: "list"
                required: false
                fields:
                  - { label: "Label", name: "label", widget: "string" }
                  - { label: "URL", name: "url", widget: "string" }
              - {
                  label: "Redbubble URL",
                  name: "redbubble_url",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Newsletter URL",
                  name: "newsletter_url",
                  widget: "string",
                  required: false,
                }
              - { label: "Contact Email", name: "contact_email", widget: "string" }
              - {
                  label: "Contact Page Intro",
                  name: "contact_page_intro",
                  widget: "text",
                  required: false,
                }
              - {
                  label: "Contact Page Body",
                  name: "contact_page_body",
                  widget: "text",
                  required: false,
                }
              - {
                  label: "Contact Response Time",
                  name: "contact_response_time",
                  widget: "string",
                  required: false,
                }

  - name: "books"
    label: "Books"
    folder: "src/content/books"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - {
          label: "Cover Image",
          name: "cover_image",
          widget: "image",
          required: false,
        }
      - {
          label: "Publish Date",
          name: "publish_date",
          widget: "datetime",
          required: false,
        }
      - {
          label: "Highlight",
          name: "highlight",
          widget: "boolean",
          required: false,
        }
      - {
          label: "Draft",
          name: "draft",
          widget: "boolean",
          required: false,
          default: false,
          hint: "When enabled, this book will not appear on the site.",
        }
      - { label: "Amazon URL", name: "amazon_url", widget: "string" }
      - {
          label: "Barnes & Noble URL",
          name: "barnes_noble_url",
          widget: "string",
        }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "events"
    label: "Events"
    files:
      - name: "events"
        label: "All Events"
        file: "src/content/events.yml"
        fields:
          - label: "Events"
            name: "events"
            widget: "list"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Date", name: "date", widget: "datetime" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Address", name: "address", widget: "string", required: false }
              - { label: "Time", name: "time", widget: "string", required: false }
              - { label: "URL", name: "url", widget: "string", required: false }
              - {
                  label: "Description",
                  name: "description",
                  widget: "text",
                  required: false,
                }

  - name: "testimonials"
    label: "Testimonials"
    files:
      - name: "testimonials"
        label: "All Testimonials"
        file: "src/content/testimonials.yml"
        fields:
          - label: "Testimonials"
            name: "testimonials"
            widget: "list"
            fields:
              - { label: "Quote", name: "quote", widget: "text" }
              - { label: "Author", name: "author", widget: "string" }
              - {
                  label: "Role",
                  name: "role",
                  widget: "string",
                  required: false,
                }
              - {
                  label: "Source",
                  name: "source",
                  widget: "string",
                  required: false,
                }
